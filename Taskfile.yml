version: "3"

tasks:
  setup:
    desc: Full install — Homebrew tools, plugin pack build, and config wiring
    cmds:
      - |
        if ! docker info &>/dev/null; then
          echo "Error: Docker is not running. Please start Docker Desktop first."
          exit 1
        fi
      - brew bundle install
      - task: build
      - task: install

  build:
    desc: Build the Neovim plugin pack inside Docker (leaves named container nvim-build)
    cmds:
      - docker rm -f nvim-build 2>/dev/null || true
      - |
        docker run --name nvim-build \
          -v "{{.USER_WORKING_DIR}}:/repo" \
          -w /repo \
          nixos/nix \
          sh -c "nix build .#nvim-plugin-pack --no-sandbox --extra-experimental-features 'nix-command flakes' && cp -rL ./result/. /tmp/nvim-pack/ && chmod -R u+w /tmp/nvim-pack/"

  install:
    desc: Install built plugin pack and wire Lua config symlinks to host paths
    cmds:
      - |
        if ! docker inspect nvim-build &>/dev/null; then
          echo "Error: nvim-build container not found. Run 'task build' first."
          exit 1
        fi
      - mkdir -p $HOME/.local/share/nvim/site/pack $HOME/.config/nvim
      - rm -rf $HOME/.local/share/nvim/site/pack/nix
      - docker cp nvim-build:/tmp/nvim-pack/pack/nix $HOME/.local/share/nvim/site/pack/
      - rm -f $HOME/.config/nvim/init.lua $HOME/.config/nvim/lua
      - ln -s "{{.USER_WORKING_DIR}}/lua/init.lua" $HOME/.config/nvim/init.lua
      - ln -s "{{.USER_WORKING_DIR}}/lua" $HOME/.config/nvim/lua
      - docker rm nvim-build

  update:
    desc: Update all flake inputs inside Docker (flake.lock updated on host via bind mount)
    cmds:
      - |
        docker run --rm \
          -v "{{.USER_WORKING_DIR}}:/repo" \
          -w /repo \
          nixos/nix \
          sh -c "nix flake update --extra-experimental-features 'nix-command flakes'"

  fmt:
    desc: Format all Lua and Nix files
    cmds:
      - |
        docker run --rm \
          -v "{{.USER_WORKING_DIR}}:/repo" \
          -w /repo \
          nixos/nix \
          sh -c "nix develop --extra-experimental-features 'nix-command flakes' --command sh -c 'stylua . && nixfmt flake.nix modules/*.nix'"

  lint:
    desc: Check formatting without modifying files
    cmds:
      - |
        docker run --rm \
          -v "{{.USER_WORKING_DIR}}:/repo" \
          -w /repo \
          nixos/nix \
          sh -c "nix develop --extra-experimental-features 'nix-command flakes' --command sh -c 'stylua --check . && nixfmt --check flake.nix modules/*.nix'"

  test:
    desc: Run luacheck (plugin loading is verified manually on the host after task install)
    cmds:
      - |
        docker run --rm \
          -v "{{.USER_WORKING_DIR}}:/repo" \
          -w /repo \
          nixos/nix \
          sh -c "nix develop --extra-experimental-features 'nix-command flakes' --command sh -c 'luacheck lua/'"

  lsp-build:
    desc: Build the nvim-lsp Docker image (contains all language servers and formatters)
    cmds:
      - docker build -t nvim-lsp .

  lsp-install:
    desc: Install nvim-lsp-start script and register auto-start service for this machine
    cmds:
      - ln -sf "{{.USER_WORKING_DIR}}/scripts/lsp-start.sh" /usr/local/bin/nvim-lsp-start
      - chmod +x /usr/local/bin/nvim-lsp-start
      - |
        if [ "$(uname)" = "Darwin" ]; then
          cp "{{.USER_WORKING_DIR}}/config/nvim-lsp.plist" "$HOME/Library/LaunchAgents/com.local.nvim-lsp.plist"
          launchctl load "$HOME/Library/LaunchAgents/com.local.nvim-lsp.plist"
          echo "Registered launchd service: com.local.nvim-lsp"
        else
          mkdir -p "$HOME/.config/systemd/user"
          cp "{{.USER_WORKING_DIR}}/config/nvim-lsp.service" "$HOME/.config/systemd/user/nvim-lsp.service"
          systemctl --user daemon-reload
          systemctl --user enable --now nvim-lsp
          echo "Registered systemd user service: nvim-lsp"
        fi
