version: "3"

tasks:
  rebuild:
    desc: Rebuild and switch to the current neovim config via home-manager
    cmds:
      - nix run .#rebuild

  update:
    desc: Update all flake inputs and rebuild
    cmds:
      - nix flake update
      - task: rebuild

  fmt:
    desc: Format all Lua and Nix files
    cmds:
      - nix develop --command stylua .
      - nix fmt

  lint:
    desc: Check formatting without modifying files
    cmds:
      - nix develop --command stylua --check .
      - nix fmt -- --check

  test:
    desc: Run luacheck and verify config loads cleanly in Neovim
    cmds:
      - nix develop --command sh -c "luacheck lua/ && nvim --headless -u lua/init.lua +qa"
